<svg xmlns="http://www.w3.org/2000/svg" width="640" height="560" viewBox="0 0 640 560">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&amp;display=swap');
      text { font-family: 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="640" height="560" rx="8" fill="#f0ece5" stroke="#9a968e" stroke-width="1.5"/>

  <!-- Header -->
  <rect x="0" y="0" width="640" height="44" rx="8" fill="#e8e4dc"/>
  <rect x="0" y="36" width="640" height="8" fill="#e8e4dc"/>
  <line x1="0" y1="44" x2="640" y2="44" stroke="#c4c0b8" stroke-width="1"/>

  <text x="20" y="28" font-size="11" font-weight="600" letter-spacing="0.15em" fill="#5b7ea1">GENOME_AI</text>
  <text x="120" y="28" font-size="11" font-weight="400" fill="#7a7a76">//</text>
  <text x="138" y="28" font-size="10" font-weight="500" letter-spacing="0.15em" fill="#7a7a76">COMMAND_INTERFACE</text>

  <!-- +NEW button pressed state -->
  <rect x="430" y="10" width="56" height="24" rx="3" fill="#c4724e" stroke="#c4724e" stroke-width="1"/>
  <text x="440" y="26" font-size="9" font-weight="600" letter-spacing="0.1em" fill="#f0ece5">+NEW</text>

  <rect x="494" y="10" width="32" height="24" rx="3" fill="none" stroke="#9a968e" stroke-width="1"/>
  <text x="505" y="26" font-size="10" font-weight="500" fill="#5e5e5a">H</text>

  <rect x="534" y="10" width="44" height="24" rx="3" fill="none" stroke="#9a968e" stroke-width="1"/>
  <text x="543" y="26" font-size="9" font-weight="500" letter-spacing="0.1em" fill="#5e5e5a">ESC</text>

  <!-- Undo toast -->
  <rect x="20" y="56" width="600" height="40" rx="4" fill="#e8e4dc" stroke="#5b7ea1" stroke-width="1"/>

  <!-- Check icon approximation -->
  <circle cx="40" cy="76" r="8" fill="none" stroke="#5a8a5e" stroke-width="1.5"/>
  <text x="36" y="80" font-size="10" font-weight="600" fill="#5a8a5e">+</text>

  <text x="56" y="72" font-size="10" font-weight="500" fill="#3a3a38">Thread saved:</text>
  <text x="160" y="72" font-size="10" font-weight="400" fill="#5e5e5a">"CYP2D6 metabolism and fluoxetine"</text>

  <rect x="56" y="80" width="190" height="12" rx="2" fill="none"/>
  <text x="56" y="90" font-size="9" font-weight="500" fill="#5b7ea1" text-decoration="underline">UNDO -- return to thread</text>

  <!-- Auto-dismiss indicator -->
  <rect x="480" y="66" width="130" height="16" rx="2" fill="none"/>
  <text x="490" y="78" font-size="8" font-weight="400" letter-spacing="0.1em" fill="#9a968e">auto-dismiss 3s</text>

  <!-- Progress bar for auto-dismiss -->
  <rect x="480" y="84" width="130" height="2" rx="1" fill="#c4c0b8"/>
  <rect x="480" y="84" width="86" height="2" rx="1" fill="#5b7ea1"/>

  <line x1="20" y1="108" x2="620" y2="108" stroke="#b8b4ac" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- Recent Threads (previous thread now visible in list) -->
  <text x="20" y="132" font-size="9" font-weight="600" letter-spacing="0.2em" fill="#7a7a76">RECENT THREADS</text>
  <line x1="20" y1="142" x2="620" y2="142" stroke="#b8b4ac" stroke-width="1" stroke-dasharray="4,3"/>

  <rect x="20" y="150" width="600" height="32" rx="3" fill="none"/>
  <text x="32" y="170" font-size="10" fill="#7a7a76">></text>
  <text x="44" y="170" font-size="11" font-weight="400" fill="#5e5e5a">CYP2D6 metabolism and fluoxetine</text>
  <text x="520" y="170" font-size="9" fill="#7a7a76">just now</text>

  <rect x="20" y="186" width="600" height="32" rx="3" fill="none"/>
  <text x="32" y="206" font-size="10" fill="#7a7a76">></text>
  <text x="44" y="206" font-size="11" font-weight="400" fill="#5e5e5a">MTHFR variants and folate pathway</text>
  <text x="528" y="206" font-size="9" fill="#7a7a76">1d ago</text>

  <rect x="20" y="222" width="600" height="32" rx="3" fill="none"/>
  <text x="32" y="242" font-size="10" fill="#7a7a76">></text>
  <text x="44" y="242" font-size="11" font-weight="400" fill="#5e5e5a">Addiction risk SNPs overview</text>
  <text x="528" y="242" font-size="9" fill="#7a7a76">3d ago</text>

  <line x1="20" y1="264" x2="620" y2="264" stroke="#b8b4ac" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Suggested Section -->
  <text x="20" y="290" font-size="9" font-weight="600" letter-spacing="0.2em" fill="#7a7a76">SUGGESTED FOR YOU</text>

  <rect x="20" y="302" width="600" height="38" rx="4" fill="none" stroke="#c4c0b8" stroke-width="1"/>
  <text x="36" y="325" font-size="11" font-weight="400" fill="#5b7ea1">What are my pharmacogenomics highlights?</text>

  <rect x="20" y="348" width="600" height="38" rx="4" fill="none" stroke="#c4c0b8" stroke-width="1"/>
  <text x="36" y="371" font-size="11" font-weight="400" fill="#5b7ea1">Summarize my mental health risk factors</text>

  <!-- Explore Section -->
  <text x="20" y="416" font-size="9" font-weight="600" letter-spacing="0.2em" fill="#7a7a76">EXPLORE</text>

  <rect x="20" y="428" width="110" height="26" rx="3" fill="none" stroke="#c4c0b8" stroke-width="1"/>
  <text x="32" y="445" font-size="9" font-weight="400" letter-spacing="0.05em" fill="#5e5e5a">COMT variants</text>

  <rect x="138" y="428" width="76" height="26" rx="3" fill="none" stroke="#c4c0b8" stroke-width="1"/>
  <text x="150" y="445" font-size="9" font-weight="400" letter-spacing="0.05em" fill="#5e5e5a">CYP2D6</text>

  <rect x="222" y="428" width="70" height="26" rx="3" fill="none" stroke="#c4c0b8" stroke-width="1"/>
  <text x="234" y="445" font-size="9" font-weight="400" letter-spacing="0.05em" fill="#5e5e5a">MTHFR</text>

  <rect x="300" y="428" width="76" height="26" rx="3" fill="none" stroke="#c4c0b8" stroke-width="1"/>
  <text x="312" y="445" font-size="9" font-weight="400" letter-spacing="0.05em" fill="#5e5e5a">SLC6A4</text>

  <rect x="384" y="428" width="66" height="26" rx="3" fill="none" stroke="#c4c0b8" stroke-width="1"/>
  <text x="396" y="445" font-size="9" font-weight="400" letter-spacing="0.05em" fill="#5e5e5a">BDNF</text>

  <!-- Input bar -->
  <line x1="0" y1="510" x2="640" y2="510" stroke="#c4c0b8" stroke-width="1"/>
  <rect x="0" y="510" width="640" height="50" fill="#e8e4dc"/>
  <rect x="0" y="552" width="640" height="8" rx="8" fill="#e8e4dc"/>
  <text x="20" y="536" font-size="10" font-weight="400" fill="#5b7ea1">></text>
  <text x="36" y="536" font-size="11" font-weight="400" letter-spacing="0.08em" fill="#7a7a76">ASK_ABOUT_YOUR_GENOME...</text>
  <rect x="580" y="520" width="40" height="24" rx="3" fill="none" stroke="#c4c0b8" stroke-width="1"/>
  <text x="591" y="536" font-size="9" font-weight="400" fill="#7a7a76">mic</text>

  <!-- Annotation -->
  <text x="320" y="490" font-size="8" font-weight="400" fill="#9a968e" text-anchor="middle">04 / NEW CHAT — UNDO TOAST, NO CONFIRMATION DIALOG</text>
</svg>