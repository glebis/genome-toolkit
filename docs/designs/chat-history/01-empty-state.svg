<svg xmlns="http://www.w3.org/2000/svg" width="640" height="560" viewBox="0 0 640 560">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&amp;display=swap');
      text { font-family: 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <!-- Background overlay -->
  <rect width="640" height="560" rx="8" fill="#f0ece5" stroke="#9a968e" stroke-width="1.5"/>

  <!-- Header -->
  <rect x="0" y="0" width="640" height="44" rx="8" fill="#e8e4dc"/>
  <rect x="0" y="36" width="640" height="8" fill="#e8e4dc"/>
  <line x1="0" y1="44" x2="640" y2="44" stroke="#c4c0b8" stroke-width="1"/>

  <text x="20" y="28" font-size="11" font-weight="600" letter-spacing="0.15em" fill="#5b7ea1">GENOME_AI</text>
  <text x="120" y="28" font-size="11" font-weight="400" fill="#7a7a76">//</text>
  <text x="138" y="28" font-size="10" font-weight="500" letter-spacing="0.15em" fill="#7a7a76">COMMAND_INTERFACE</text>

  <!-- Header buttons -->
  <rect x="430" y="10" width="56" height="24" rx="3" fill="none" stroke="#c4724e" stroke-width="1"/>
  <text x="440" y="26" font-size="9" font-weight="600" letter-spacing="0.1em" fill="#c4724e">+NEW</text>

  <rect x="494" y="10" width="32" height="24" rx="3" fill="none" stroke="#9a968e" stroke-width="1"/>
  <text x="505" y="26" font-size="10" font-weight="500" fill="#5e5e5a">H</text>

  <rect x="534" y="10" width="44" height="24" rx="3" fill="none" stroke="#9a968e" stroke-width="1"/>
  <text x="543" y="26" font-size="9" font-weight="500" letter-spacing="0.1em" fill="#5e5e5a">ESC</text>

  <!-- Keyboard shortcuts -->
  <text x="586" y="26" font-size="8" fill="#7a7a76">^N</text>
  <text x="610" y="26" font-size="8" fill="#7a7a76">^H</text>

  <!-- Recent Threads Section -->
  <text x="20" y="72" font-size="9" font-weight="600" letter-spacing="0.2em" fill="#7a7a76">RECENT THREADS</text>
  <line x1="20" y1="82" x2="620" y2="82" stroke="#b8b4ac" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Thread 1 - active indicator -->
  <rect x="20" y="92" width="600" height="36" rx="3" fill="#e8e4dc" stroke="#c4c0b8" stroke-width="0.5"/>
  <rect x="20" y="92" width="3" height="36" rx="1" fill="#5b7ea1"/>
  <text x="32" y="106" font-size="10" font-weight="400" fill="#5b7ea1">></text>
  <text x="44" y="106" font-size="11" font-weight="500" fill="#3a3a38">CYP2D6 metabolism and fluoxetine</text>
  <text x="44" y="120" font-size="9" font-weight="300" fill="#7a7a76">"What medications should I watch..."</text>
  <text x="520" y="106" font-size="9" font-weight="400" fill="#7a7a76">2h ago</text>
  <text x="590" y="106" font-size="10" fill="#9a968e" font-weight="300">x</text>

  <!-- Thread 2 -->
  <rect x="20" y="134" width="600" height="36" rx="3" fill="none"/>
  <text x="32" y="148" font-size="10" font-weight="400" fill="#7a7a76">></text>
  <text x="44" y="148" font-size="11" font-weight="400" fill="#3a3a38">MTHFR variants and folate pathway</text>
  <text x="44" y="162" font-size="9" font-weight="300" fill="#7a7a76">"Tell me about my MTHFR C677T..."</text>
  <text x="520" y="148" font-size="9" font-weight="400" fill="#7a7a76">1d ago</text>
  <text x="590" y="148" font-size="10" fill="#9a968e" font-weight="300">x</text>

  <!-- Thread 3 -->
  <rect x="20" y="176" width="600" height="36" rx="3" fill="none"/>
  <text x="32" y="190" font-size="10" font-weight="400" fill="#7a7a76">></text>
  <text x="44" y="190" font-size="11" font-weight="400" fill="#3a3a38">Addiction risk SNPs overview</text>
  <text x="44" y="204" font-size="9" font-weight="300" fill="#7a7a76">"What does my OPRM1 variant mean..."</text>
  <text x="520" y="190" font-size="9" font-weight="400" fill="#7a7a76">3d ago</text>
  <text x="590" y="190" font-size="10" fill="#9a968e" font-weight="300">x</text>

  <line x1="20" y1="222" x2="620" y2="222" stroke="#b8b4ac" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- Suggested Section -->
  <text x="20" y="248" font-size="9" font-weight="600" letter-spacing="0.2em" fill="#7a7a76">SUGGESTED FOR YOU</text>

  <rect x="20" y="260" width="600" height="38" rx="4" fill="none" stroke="#c4c0b8" stroke-width="1"/>
  <text x="36" y="283" font-size="11" font-weight="400" fill="#5b7ea1">What are my pharmacogenomics highlights?</text>

  <rect x="20" y="306" width="600" height="38" rx="4" fill="none" stroke="#c4c0b8" stroke-width="1"/>
  <text x="36" y="329" font-size="11" font-weight="400" fill="#5b7ea1">Summarize my mental health risk factors</text>

  <rect x="20" y="352" width="600" height="38" rx="4" fill="none" stroke="#c4c0b8" stroke-width="1"/>
  <text x="36" y="375" font-size="11" font-weight="400" fill="#5b7ea1">Personalized drug metabolism overview</text>

  <!-- Explore Section -->
  <text x="20" y="418" font-size="9" font-weight="600" letter-spacing="0.2em" fill="#7a7a76">EXPLORE</text>

  <rect x="20" y="430" width="110" height="26" rx="3" fill="none" stroke="#c4c0b8" stroke-width="1"/>
  <text x="32" y="447" font-size="9" font-weight="400" letter-spacing="0.05em" fill="#5e5e5a">COMT variants</text>

  <rect x="138" y="430" width="76" height="26" rx="3" fill="none" stroke="#c4c0b8" stroke-width="1"/>
  <text x="150" y="447" font-size="9" font-weight="400" letter-spacing="0.05em" fill="#5e5e5a">CYP2D6</text>

  <rect x="222" y="430" width="70" height="26" rx="3" fill="none" stroke="#c4c0b8" stroke-width="1"/>
  <text x="234" y="447" font-size="9" font-weight="400" letter-spacing="0.05em" fill="#5e5e5a">MTHFR</text>

  <rect x="300" y="430" width="76" height="26" rx="3" fill="none" stroke="#c4c0b8" stroke-width="1"/>
  <text x="312" y="447" font-size="9" font-weight="400" letter-spacing="0.05em" fill="#5e5e5a">SLC6A4</text>

  <rect x="384" y="430" width="66" height="26" rx="3" fill="none" stroke="#c4c0b8" stroke-width="1"/>
  <text x="396" y="447" font-size="9" font-weight="400" letter-spacing="0.05em" fill="#5e5e5a">BDNF</text>

  <!-- Input bar -->
  <line x1="0" y1="510" x2="640" y2="510" stroke="#c4c0b8" stroke-width="1"/>
  <rect x="0" y="510" width="640" height="50" fill="#e8e4dc"/>
  <rect x="0" y="552" width="640" height="8" rx="8" fill="#e8e4dc"/>

  <text x="20" y="536" font-size="10" font-weight="400" fill="#5b7ea1">></text>
  <text x="36" y="536" font-size="11" font-weight="400" letter-spacing="0.08em" fill="#7a7a76">ASK_ABOUT_YOUR_GENOME...</text>

  <rect x="580" y="520" width="40" height="24" rx="3" fill="none" stroke="#c4c0b8" stroke-width="1"/>
  <text x="591" y="536" font-size="9" font-weight="400" fill="#7a7a76">mic</text>

  <!-- Annotation -->
  <text x="320" y="490" font-size="8" font-weight="400" fill="#9a968e" text-anchor="middle">01 / EMPTY STATE WITH RECENT THREADS</text>
</svg>