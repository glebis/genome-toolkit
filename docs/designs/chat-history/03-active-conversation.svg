<svg xmlns="http://www.w3.org/2000/svg" width="640" height="560" viewBox="0 0 640 560">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&amp;display=swap');
      text { font-family: 'IBM Plex Mono', monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="640" height="560" rx="8" fill="#f0ece5" stroke="#9a968e" stroke-width="1.5"/>

  <!-- Header -->
  <rect x="0" y="0" width="640" height="56" rx="8" fill="#e8e4dc"/>
  <rect x="0" y="48" width="640" height="8" fill="#e8e4dc"/>
  <line x1="0" y1="56" x2="640" y2="56" stroke="#c4c0b8" stroke-width="1"/>

  <!-- Title line -->
  <text x="20" y="24" font-size="11" font-weight="600" letter-spacing="0.15em" fill="#5b7ea1">GENOME_AI</text>
  <text x="120" y="24" font-size="11" font-weight="400" fill="#7a7a76">//</text>
  <text x="138" y="24" font-size="10" font-weight="500" fill="#3a3a38">CYP2D6 metabolism...</text>

  <!-- Thread metadata line -->
  <text x="20" y="44" font-size="8" font-weight="400" letter-spacing="0.1em" fill="#7a7a76">thread 3/8</text>
  <text x="100" y="44" font-size="8" fill="#b8b4ac">|</text>
  <text x="110" y="44" font-size="8" font-weight="400" letter-spacing="0.1em" fill="#7a7a76">4 messages</text>
  <text x="194" y="44" font-size="8" fill="#b8b4ac">|</text>
  <text x="204" y="44" font-size="8" font-weight="400" letter-spacing="0.1em" fill="#7a7a76">started 14:32</text>

  <!-- PGX badge -->
  <rect x="310" y="34" width="40" height="14" rx="2" fill="none" stroke="#5b7ea1" stroke-width="0.5"/>
  <text x="319" y="44" font-size="7" font-weight="500" letter-spacing="0.1em" fill="#5b7ea1">PGX</text>

  <!-- Header buttons -->
  <rect x="430" y="10" width="56" height="24" rx="3" fill="none" stroke="#c4724e" stroke-width="1"/>
  <text x="440" y="26" font-size="9" font-weight="600" letter-spacing="0.1em" fill="#c4724e">+NEW</text>

  <rect x="494" y="10" width="32" height="24" rx="3" fill="none" stroke="#9a968e" stroke-width="1"/>
  <text x="505" y="26" font-size="10" font-weight="500" fill="#5e5e5a">H</text>

  <rect x="534" y="10" width="44" height="24" rx="3" fill="none" stroke="#9a968e" stroke-width="1"/>
  <text x="543" y="26" font-size="9" font-weight="500" letter-spacing="0.1em" fill="#5e5e5a">ESC</text>

  <!-- User message -->
  <text x="20" y="82" font-size="9" font-weight="600" letter-spacing="0.15em" fill="#c4724e">INPUT //</text>

  <rect x="20" y="92" width="600" height="48" rx="4" fill="#e8e4dc" stroke="#c4c0b8" stroke-width="0.5"/>
  <text x="32" y="112" font-size="11" font-weight="400" fill="#3a3a38">What medications should I watch out for with</text>
  <text x="32" y="128" font-size="11" font-weight="400" fill="#3a3a38">my CYP2D6 poor metabolizer status?</text>

  <!-- Assistant response -->
  <text x="20" y="164" font-size="9" font-weight="600" letter-spacing="0.15em" fill="#5b7ea1">OUTPUT //</text>

  <!-- Copy button -->
  <rect x="570" y="150" width="50" height="20" rx="2" fill="none" stroke="#c4c0b8" stroke-width="0.5"/>
  <text x="580" y="163" font-size="8" font-weight="400" letter-spacing="0.1em" fill="#7a7a76">COPY</text>

  <rect x="20" y="174" width="600" height="180" rx="4" fill="#f0ece5" stroke="#c4c0b8" stroke-width="0.5"/>

  <text x="32" y="196" font-size="11" font-weight="400" fill="#3a3a38">Based on your CYP2D6 *4/*4 genotype, you are a</text>
  <text x="32" y="214" font-size="11" font-weight="600" fill="#3a3a38">poor metabolizer. Key medications affected:</text>

  <!-- Insight box -->
  <rect x="40" y="228" width="568" height="60" rx="3" fill="#e8e4dc" stroke="#5b7ea1" stroke-width="0.5"/>
  <text x="52" y="244" font-size="8" font-weight="600" letter-spacing="0.15em" fill="#5b7ea1">* INSIGHT</text>
  <line x1="110" y1="240" x2="596" y2="240" stroke="#8da4bc" stroke-width="0.5" stroke-dasharray="3,2"/>
  <text x="52" y="260" font-size="10" font-weight="400" fill="#3a3a38">Codeine will have significantly reduced efficacy</text>
  <text x="52" y="276" font-size="10" font-weight="400" fill="#3a3a38">-- your body cannot convert it to morphine.</text>

  <text x="32" y="310" font-size="10" font-weight="400" fill="#5e5e5a">OPRM1 and CYP2D6 interact in opioid response.</text>
  <text x="32" y="326" font-size="10" font-weight="400" fill="#5e5e5a">Tramadol, tamoxifen also affected.</text>
  <text x="32" y="344" font-size="10" font-weight="400" fill="#5e5e5a">Consider alternative pain management.</text>

  <!-- Action buttons -->
  <line x1="20" y1="368" x2="620" y2="368" stroke="#b8b4ac" stroke-width="1" stroke-dasharray="4,3"/>

  <rect x="20" y="378" width="160" height="28" rx="3" fill="none" stroke="#5b7ea1" stroke-width="1"/>
  <text x="32" y="396" font-size="9" font-weight="500" letter-spacing="0.05em" fill="#5b7ea1">Show CYP2D6 details</text>

  <rect x="188" y="378" width="140" height="28" rx="3" fill="none" stroke="#5b7ea1" stroke-width="1"/>
  <text x="200" y="396" font-size="9" font-weight="500" letter-spacing="0.05em" fill="#5b7ea1">Add to checklist</text>

  <rect x="336" y="378" width="168" height="28" rx="3" fill="none" stroke="#c4c0b8" stroke-width="1"/>
  <text x="348" y="396" font-size="9" font-weight="400" letter-spacing="0.05em" fill="#5e5e5a">Tell me about alternatives</text>

  <rect x="512" y="378" width="108" height="28" rx="3" fill="none" stroke="#c4c0b8" stroke-width="1"/>
  <text x="520" y="396" font-size="9" font-weight="400" letter-spacing="0.05em" fill="#5e5e5a">Drug interactions</text>

  <!-- Suggestions row -->
  <text x="20" y="432" font-size="8" font-weight="600" letter-spacing="0.15em" fill="#7a7a76">FOLLOW UP</text>

  <rect x="20" y="440" width="290" height="26" rx="3" fill="none" stroke="#c4c0b8" stroke-width="0.5"/>
  <text x="32" y="457" font-size="9" font-weight="400" fill="#5e5e5a">What about SSRIs with my genotype?</text>

  <rect x="318" y="440" width="302" height="26" rx="3" fill="none" stroke="#c4c0b8" stroke-width="0.5"/>
  <text x="330" y="457" font-size="9" font-weight="400" fill="#5e5e5a">How does this interact with COMT?</text>

  <!-- Input bar -->
  <line x1="0" y1="510" x2="640" y2="510" stroke="#c4c0b8" stroke-width="1"/>
  <rect x="0" y="510" width="640" height="50" fill="#e8e4dc"/>
  <rect x="0" y="552" width="640" height="8" rx="8" fill="#e8e4dc"/>
  <text x="20" y="536" font-size="10" font-weight="400" fill="#5b7ea1">></text>
  <text x="36" y="536" font-size="11" font-weight="400" letter-spacing="0.08em" fill="#7a7a76">FOLLOW_UP...</text>
  <rect x="580" y="520" width="40" height="24" rx="3" fill="none" stroke="#c4c0b8" stroke-width="1"/>
  <text x="591" y="536" font-size="9" font-weight="400" fill="#7a7a76">mic</text>

  <!-- Annotation -->
  <text x="320" y="495" font-size="8" font-weight="400" fill="#9a968e" text-anchor="middle">03 / ACTIVE CONVERSATION — THREAD CONTEXT IN HEADER</text>
</svg>